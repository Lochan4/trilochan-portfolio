  <!-- ================================================================
       HERO
       Canvas renders the wave beam (subtle white glow on black).
       hero-bg-cards holds 4 content cards that are invisible until
       the wave sweeps over them — each card fades in as the beam
       passes, hinting at content. User cannot interact until they
       scroll down to the full cards section below.
  ================================================================ -->
  <section class="hero" id="hero">
    <canvas class="hero-canvas" id="heroCanvas"></canvas>
    <div class="hero-bg-cards" id="heroBgCards"></div>
    <h1 class="hero-name">

    </h1>
    <div class="hero-scroll" id="heroScroll">
      <span class="hero-scroll-text">scroll</span>
      <span class="hero-scroll-arrow"></span>
    </div>
  </section>

  <!-- ================================================================
       HORIZONTAL CARDS SECTION
       .cards-track is a tall div creating scroll room.
       .cards-scene is sticky — the rail translates horizontally
       as the user scrolls vertically.
  ================================================================ -->
  <div class="cards-track" id="cardsTrack">
    <div class="cards-scene" id="cardsScene">
      <div class="cards-rail" id="cardsRail"></div>
    </div>
  </div>
